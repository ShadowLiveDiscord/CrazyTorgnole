<div class="container">
    <div class="login-card">

        <div class="login-subtitle">Connecte-toi avec ton compte Microsoft ou en mode hors-ligne</div>

        <button class="connect-home ms-btn">

                <rect x="1" y="1" width="10" height="10" fill="#f25022" />

                <rect x="1" y="12" width="10" height="10" fill="#00a4ef" />

        <div class="login-divider"><span>OU</span></div>

        <label class="login-label">Pseudo</label>

        <button class="connect connect-offline offline-btn">Jouer en hors-ligne</button>

        <button class="cancel cancel-home back-btn" style="display: none;">← Retour</button>

    <div class="login-footer">CrazyTorgnole — Dev by ShadowLive</div>
