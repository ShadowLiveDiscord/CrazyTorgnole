<div class="container">
    <div class="news-dropdown-wrapper">
        <button class="news-dropdown-btn">
            Actualités
            <i class="fa-solid fa-chevron-down"></i>
        </button>
        <div class="news-dropdown">
            <div class="news-list content-scroll"></div>
        </div>
    </div>

    <div class="home-bottom">
        <div class="social-tab">
            <div class="social-list content-scroll">
                <div data-url="https://discord.gg/..." class="social-block">
                    <i class="fa-brands fa-discord"></i>
                </div>

                <div data-url="https://github.com/Mewax07" class="social-block">
                    <i class="fa-brands fa-github"></i>
                </div>

                <div data-url="https://www.youtube.com/..." class="social-block">
                    <i class="fa-brands fa-youtube"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="player-options">
            <div class="account-widget">
                <div class="player-head"></div>
                <div class="account-widget-infos">
                    <div class="account-widget-name">Steve</div>
                    <div class="account-widget-status">OFFLINE</div>
                </div>
                <i class="fa-solid fa-chevron-down account-widget-chevron"></i>
            </div>

            <div class="account-dropdown"></div>
        </div>

        <div class="play-elements">
            <div class="info-starting-game">
                <div class="launcher-version">v1.0.0 — Dev by ShadowLive</div>
                <div class="info-starting-game-text">Prêt à jouer</div>
                <progress value="0" max="100" class="progress-bar"></progress>
            </div>

            <div class="play-instance">
                <button class="play-btn"><i class="fa-solid fa-play"></i> Jouer</button>
                <div class="instance-select icon-arrow">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </div>
            </div>
        </div>

        <div class="settings-btn icon-settings">
            <i class="fa-solid fa-gear"></i>
        </div>
    </div>

    <div class="instance-popup">
        <div class="instances-tab">
            <div class="close-popup icon-close">
                <i class="fa-solid fa-xmark"></i>
            </div>
            <p>Choisissez votre instance...</p>
            <div class="instances-List"></div>
        </div>
    </div>
</div>
